<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Secret Box Project</title>
</head>
<body>

    <div class="secret-container" style="text-align: center; margin-top: 50px;">
        <h2>The Salazar Secret Box</h2>
        
        <input type="text" id="boxInput" placeholder="Enter password..." style="padding: 10px; font-size: 16px;">
        
        <button onclick="checkPassword()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Unlock</button>
        
        <div id="secretBoxContent" style="display: none; margin-top: 20px; border: 1px solid #ccc; padding: 20px; background-color: #f9f9f9;">
            <p><strong>Secret Information:</strong> Salazar was a frugal man and quiet person.</p>
        </div>
    </div>

    <script>
    function checkPassword() {
        let password = document.getElementById("boxInput").value;
        
        if (password === "1974") {
            alert("Success!");
            document.getElementById("secretBoxContent").style.display = "block";
        } else {
            alert("Wrong password. Access denied!");
        }
    }
    </script>

</body>
</html>
